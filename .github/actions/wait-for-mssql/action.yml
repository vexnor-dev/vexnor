name: Wait for MSSQL
description: Waits until SQL Server is ready to accept connections

runs:
  using: "composite"
  steps:
    - name: Install sqlcmd
      shell: bash
      run: |
        curl -fsSL https://packages.microsoft.com/keys/microsoft.asc | sudo gpg --dearmor -o /usr/share/keyrings/microsoft-prod.gpg
        curl -fsSL https://packages.microsoft.com/config/ubuntu/22.04/prod.list | sudo tee /etc/apt/sources.list.d/mssql-release.list
        sudo apt-get update -q
        sudo ACCEPT_EULA=Y apt-get install -yq mssql-tools18 unixodbc-dev

    - name: Wait for MSSQL to be ready
      shell: bash
      run: |
        for i in $(seq 1 30); do
          if /opt/mssql-tools18/bin/sqlcmd -S localhost,1433 -U sa -P 'P@ssw0rd!' -C -Q "SELECT 1" &>/dev/null; then
            echo "MSSQL is ready"
            exit 0
          fi
          echo "Waiting for MSSQL... ($i)"
          sleep 3
        done
        echo "MSSQL did not become ready in time"
        exit 1
