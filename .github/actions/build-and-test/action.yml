name: Build and Test (Composite)
description: Common steps for build, test, and reporting in CI and release flows

inputs:
  GITHUB_TOKEN:
    description: GitHub token
    required: true
  CODECOV_TOKEN:
    description: Codecov token
    required: false

runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        run_install: false

    - name: Setup pnpm cache
      uses: actions/cache@v4
      with:
        path: ~/.pnpm-store
        key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-

    - name: Setup build cache
      uses: actions/cache@v4
      with:
        path: |
          packages/*/dist
          packages/*/tsconfig.tsbuildinfo
          tests/*/dist
          tests/*/tsconfig.tsbuildinfo
          examples/*/dist
          examples/*/tsconfig.tsbuildinfo
          packages/vexnor-prisma/src/__tests__/fixtures-v6-client/generated
          packages/vexnor-prisma/src/__tests__/fixtures-v6-client-js/generated
          packages/vexnor-prisma/src/__tests__/fixtures-v7-client/generated
          packages/vexnor-prisma/src/__tests__/fixtures-v7-client-js/generated
          tests/*/prisma/generated
        key: ${{ runner.os }}-build-${{ hashFiles('packages/*/src/**', 'tests/*/src/**', 'packages/*/tsconfig.json', 'tests/*/tsconfig.json') }}
        restore-keys: |
          ${{ runner.os }}-build-

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile

    - name: Wait for Postgres
      uses: ./.github/actions/wait-for-postgres

    - name: Migrate databases
      shell: bash
      run: |
        pnpm db-migrate:postgres
        pnpm db-migrate:sqlite3
        pnpm db-migrate:mssql

    - name: Build
      shell: bash
      run: pnpm build

    - name: Run tests
      shell: bash
      run: pnpm test

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ inputs.CODECOV_TOKEN }}
        files: ./coverage/clover.xml
        fail_ci_if_error: false

    - name: Codecov summary link
      shell: bash
      run: |
        echo "### Coverage" >> $GITHUB_STEP_SUMMARY
        echo "[View on Codecov](https://app.codecov.io/github/vexnor-dev/vexnor/commit/${GITHUB_SHA})" >> $GITHUB_STEP_SUMMARY

    - name: Test summary
      uses: davelosert/vitest-coverage-report-action@v2
      with:
        json-summary-path: ./coverage/coverage-summary.json
        github-token: ${{ inputs.GITHUB_TOKEN }}
        comment-on: pr,commit
