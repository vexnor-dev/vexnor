name: Bootstrap MSSQL
description: Creates the vexnor database and vexnor_dev login/user in SQL Server

runs:
  using: "composite"
  steps:
    - name: Wait for MSSQL to be ready
      uses: ./.github/actions/wait-for-mssql

    - name: Create database and user
      shell: bash
      run: |
        /opt/mssql-tools18/bin/sqlcmd -S localhost,1433 -U sa -P "$MSSQL_SA_PASSWORD" -C -Q "
          IF NOT EXISTS (SELECT name FROM sys.databases WHERE name = '$MSSQL_DATABASE')
            CREATE DATABASE [$MSSQL_DATABASE];
          IF NOT EXISTS (SELECT name FROM sys.server_principals WHERE name = '$MSSQL_USER')
            CREATE LOGIN [$MSSQL_USER] WITH PASSWORD = '$MSSQL_PASSWORD';
        "
        /opt/mssql-tools18/bin/sqlcmd -S localhost,1433 -U sa -P "$MSSQL_SA_PASSWORD" -C -d "$MSSQL_DATABASE" -Q "
          IF NOT EXISTS (SELECT name FROM sys.database_principals WHERE name = '$MSSQL_USER')
          BEGIN
            CREATE USER [$MSSQL_USER] FOR LOGIN [$MSSQL_USER];
            ALTER ROLE db_owner ADD MEMBER [$MSSQL_USER];
          END
        "
