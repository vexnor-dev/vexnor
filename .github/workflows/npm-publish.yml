name: Publish Package to NPM

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — detect changes and report without publishing'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      tag:
        description: 'Tag to compare against (e.g. v1.0.0-beta.2). Uses latest tag if empty.'
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Step 1: Build & Test
  # No secrets. No NPM token. Only builds, tests, and produces artifacts.
  # ─────────────────────────────────────────────────────────────────────────────
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      POSTGRES_HOST: localhost
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DATABASE: postgres
      POSTGRES_PORT: 5432
      MSSQL_HOST: localhost
      MSSQL_PORT: 1433
      MSSQL_SA_PASSWORD: P@ssw0rd!
      MSSQL_DATABASE: vexnor
      MSSQL_USER: vexnor_dev
      MSSQL_PASSWORD: P@ssw0rd!
      NODE_ENV: test
      LOG_LEVEL: debug

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: P@ssw0rd!
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'P@ssw0rd!' -C -Q 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22.22.3'

      - name: Install pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bootstrap MSSQL
        uses: ./.github/actions/bootstrap-mssql

      - name: Wait for Postgres
        uses: ./.github/actions/wait-for-postgres

      - name: Migrate databases
        run: |
          pnpm db-migrate:postgres
          pnpm db-migrate:sqlite3
          pnpm db-migrate:mssql

      - name: Build
        run: pnpm build

      - name: Run tests
        run: pnpm test

      - name: Prepare publishable packages
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.tag || '0.0.0-dry-run' }}"
            VERSION="${VERSION#v}"
          else
            VERSION=${GITHUB_REF#refs/tags/v}
          fi
          echo "Setting version $VERSION on all packages"

          # Copy docs into @vexnor/core package
          cp -r docs packages/vexnor/docs

          # Set version on all workspace packages
          for pkg in packages/vexnor plugins/postgres plugins/mssql plugins/sqlite3 orms/prisma orms/drizzle orms/typeorm orms/sequelize; do
            node -e "const f='$pkg/package.json'; const p=JSON.parse(require('fs').readFileSync(f)); p.version='$VERSION'; require('fs').writeFileSync(f, JSON.stringify(p, null, 2)+'\n')"
          done

          # Replace workspace:^ dependencies with the actual version
          for pkg in plugins/*/package.json orms/*/package.json; do
            sed -i "s/\"workspace:\^\"/${Q}${VERSION}${Q}/g" "$pkg"
            sed -i "s/\"workspace:\\*\"/${Q}${VERSION}${Q}/g" "$pkg"
          done
        env:
          Q: '"'

      - name: Verify package contents (dry-run)
        run: |
          echo "### Package contents" >> $GITHUB_STEP_SUMMARY
          for pkg in packages/vexnor plugins/postgres plugins/mssql plugins/sqlite3 orms/prisma orms/drizzle orms/typeorm orms/sequelize; do
            echo "#### $pkg" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cd "$pkg"
            npm pack --dry-run 2>&1 | tee -a $GITHUB_STEP_SUMMARY
            cd "$GITHUB_WORKSPACE"
            echo '```' >> $GITHUB_STEP_SUMMARY
          done

      - name: Upload publishable artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: vexnor-publish
          path: |
            packages/vexnor/package.json
            packages/vexnor/dist/
            packages/vexnor/docs/
            packages/vexnor/cli.mjs
            packages/vexnor/README.md
            plugins/postgres/package.json
            plugins/postgres/dist/
            plugins/postgres/README.md
            plugins/mssql/package.json
            plugins/mssql/dist/
            plugins/mssql/README.md
            plugins/sqlite3/package.json
            plugins/sqlite3/dist/
            plugins/sqlite3/README.md
            orms/prisma/package.json
            orms/prisma/dist/
            orms/prisma/README.md
            orms/drizzle/package.json
            orms/drizzle/dist/
            orms/drizzle/README.md
            orms/typeorm/package.json
            orms/typeorm/dist/
            orms/typeorm/README.md
            orms/sequelize/package.json
            orms/sequelize/dist/
            orms/sequelize/README.md

  # ─────────────────────────────────────────────────────────────────────────────
  # Step 2: Publish
  # Downloads pre-built artifacts and publishes to npm.
  # No install. No scripts. Only `npm publish --ignore-scripts`.
  # ─────────────────────────────────────────────────────────────────────────────
  publish:
    needs: build-and-test
    runs-on: ubuntu-latest
    environment: ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true') && '' || 'production' }}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            registry.npmjs.org:443
            fulcio.sigstore.dev:443
            rekor.sigstore.dev:443
            tuf-repo-cdn.sigstore.dev:443

      - name: Download publishable artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: vexnor-publish

      - name: Checkout source for verification
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: _source
          fetch-depth: 0

      - name: Verify artifact integrity
        run: |
          # Verify package names haven't been tampered with
          declare -A EXPECTED_NAMES=(
            ["packages/vexnor"]="@vexnor/core"
            ["plugins/postgres"]="@vexnor/postgres"
            ["plugins/mssql"]="@vexnor/mssql"
            ["plugins/sqlite3"]="@vexnor/sqlite3"
            ["orms/prisma"]="@vexnor/prisma"
            ["orms/drizzle"]="@vexnor/drizzle"
            ["orms/typeorm"]="@vexnor/typeorm"
            ["orms/sequelize"]="@vexnor/sequelize"
          )

          FAILED=0
          for pkg in "${!EXPECTED_NAMES[@]}"; do
            EXPECTED="${EXPECTED_NAMES[$pkg]}"
            ACTUAL=$(node -e "console.log(JSON.parse(require('fs').readFileSync('$pkg/package.json')).name)")
            if [ "$ACTUAL" != "$EXPECTED" ]; then
              echo "::error::INTEGRITY FAILURE: $pkg/package.json name is '$ACTUAL', expected '$EXPECTED'"
              FAILED=1
            fi

            # Verify repository field points to the correct repo
            REPO=$(node -e "const p=JSON.parse(require('fs').readFileSync('$pkg/package.json')); console.log(typeof p.repository==='string'?p.repository:p.repository?.url||'')")
            if [[ "$REPO" != *"vexnor-dev/vexnor"* ]]; then
              echo "::error::INTEGRITY FAILURE: $pkg/package.json repository is '$REPO', expected vexnor-dev/vexnor"
              FAILED=1
            fi
          done

          # Verify dist/ directories exist and are non-empty
          for pkg in "${!EXPECTED_NAMES[@]}"; do
            if [ ! -d "$pkg/dist" ] || [ -z "$(ls -A $pkg/dist)" ]; then
              echo "::error::INTEGRITY FAILURE: $pkg/dist is missing or empty"
              FAILED=1
            fi
          done

          # Verify no unexpected scripts in package.json (preinstall/postinstall hijacking)
          for pkg in "${!EXPECTED_NAMES[@]}"; do
            SCRIPTS=$(node -e "const p=JSON.parse(require('fs').readFileSync('$pkg/package.json')); const s=p.scripts||{}; const bad=Object.keys(s).filter(k=>['preinstall','postinstall','preuninstall','install'].includes(k)); if(bad.length) console.log(bad.join(','))")
            if [ -n "$SCRIPTS" ]; then
              echo "::error::INTEGRITY FAILURE: $pkg/package.json has lifecycle scripts that should not be published: $SCRIPTS"
              FAILED=1
            fi
          done

          if [ $FAILED -ne 0 ]; then
            echo "::error::Artifact integrity check failed. Aborting publish."
            exit 1
          fi
          echo "✅ All integrity checks passed"

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22.22.3'
          registry-url: 'https://registry.npmjs.org'

      - name: Determine npm tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Use provided tag or latest tag
            if [ -n "${{ inputs.tag }}" ]; then
              VERSION="${{ inputs.tag }}"
              VERSION="${VERSION#v}"
            else
              VERSION=$(cd _source && git describe --tags --abbrev=0)
              VERSION="${VERSION#v}"
            fi
          else
            VERSION=${GITHUB_REF#refs/tags/v}
          fi

          if [[ "$VERSION" == *"-alpha"* ]]; then
            NPM_TAG="alpha"
          elif [[ "$VERSION" == *"-beta"* ]]; then
            NPM_TAG="beta"
          elif [[ "$VERSION" == *"-rc"* ]]; then
            NPM_TAG="rc"
          else
            NPM_TAG="latest"
          fi
          echo "npm_tag=$NPM_TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing $VERSION with tag: $NPM_TAG"

      - name: Generate CHANGELOG.md from release notes
        if: github.event_name == 'release'
        env:
          RELEASE_BODY: ${{ github.event.release.body }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          for pkg in packages/vexnor plugins/postgres plugins/mssql plugins/sqlite3 orms/prisma orms/drizzle orms/typeorm orms/sequelize; do
            printf '# %s\n\n%s\n\n%s\n' "$RELEASE_TAG" "$RELEASE_URL" "$RELEASE_BODY" > "$pkg/CHANGELOG.md"
          done

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_ACCESS_TOKEN }}
        run: |
          NPM_TAG="${{ steps.version.outputs.npm_tag }}"
          DRY_RUN="${{ inputs.dry_run || 'false' }}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.tag }}" ]; then
            CURRENT_TAG="${{ inputs.tag }}"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CURRENT_TAG=$(cd _source && git describe --tags --abbrev=0)
          else
            CURRENT_TAG="${GITHUB_REF#refs/tags/}"
          fi

          # Find previous tag
          PREV_TAG=$(cd _source && git tag --sort=-creatordate | grep -v "^${CURRENT_TAG}$" | head -1)
          echo "Comparing $PREV_TAG...$CURRENT_TAG"

          if [ "$DRY_RUN" = "true" ]; then
            echo "🏃 DRY RUN — no packages will be published"
            echo "### 🏃 Dry Run Report" >> $GITHUB_STEP_SUMMARY
          else
            echo "### Publish Report" >> $GITHUB_STEP_SUMMARY
          fi

          PUBLISHED=""
          SKIPPED=""

          publish_if_changed() {
            local pkg_dir="$1"

            # If no previous tag exists, publish everything
            if [ -z "$PREV_TAG" ]; then
              if [ "$DRY_RUN" = "true" ]; then
                echo "✅ $pkg_dir — WOULD publish (no previous tag)"
              else
                npm publish --ignore-scripts "./$pkg_dir" --access public --tag "$NPM_TAG" --provenance
              fi
              PUBLISHED="${PUBLISHED}  ✅ $pkg_dir\n"
              return
            fi

            if [ -n "$(cd _source && git diff --name-only "$PREV_TAG...$CURRENT_TAG" -- "$pkg_dir")" ]; then
              if [ "$DRY_RUN" = "true" ]; then
                echo "✅ $pkg_dir — WOULD publish"
              else
                npm publish --ignore-scripts "./$pkg_dir" --access public --tag "$NPM_TAG" --provenance
              fi
              PUBLISHED="${PUBLISHED}  ✅ $pkg_dir\n"
            else
              echo "⏭️  $pkg_dir — skipped (no changes)"
              SKIPPED="${SKIPPED}  ⏭️ $pkg_dir (no changes)\n"
            fi
          }

          publish_if_changed "packages/vexnor"
          publish_if_changed "plugins/postgres"
          publish_if_changed "plugins/mssql"
          publish_if_changed "plugins/sqlite3"
          publish_if_changed "orms/prisma"
          publish_if_changed "orms/drizzle"
          publish_if_changed "orms/typeorm"
          publish_if_changed "orms/sequelize"

          # Report
          echo ""
          echo "### Publish Report" >> $GITHUB_STEP_SUMMARY
          if [ -n "$PUBLISHED" ]; then
            echo "**Published:**" >> $GITHUB_STEP_SUMMARY
            printf "$PUBLISHED" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -n "$SKIPPED" ]; then
            echo "**Skipped (no changes since $PREV_TAG):**" >> $GITHUB_STEP_SUMMARY
            printf "$SKIPPED" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -z "$PUBLISHED" ]; then
            echo "⚠️ No packages were published — no changes detected since $PREV_TAG"
            echo "⚠️ No packages were published" >> $GITHUB_STEP_SUMMARY
          fi
