name: CI (GitHub)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - '**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Build & Test — NO SECRETS
  # Installs dependencies, builds, runs tests. No tokens available.
  # A compromised dependency cannot exfiltrate any credentials.
  # ─────────────────────────────────────────────────────────────────────────────
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      POSTGRES_HOST: localhost
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DATABASE: postgres
      POSTGRES_PORT: 5432
      MSSQL_HOST: localhost
      MSSQL_PORT: 1433
      MSSQL_SA_PASSWORD: P@ssw0rd!
      MSSQL_DATABASE: vexnor
      MSSQL_USER: vexnor_dev
      MSSQL_PASSWORD: P@ssw0rd!
      NODE_ENV: test
      LOG_LEVEL: debug

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: P@ssw0rd!
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'P@ssw0rd!' -C -Q 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22.22.3'

      - name: Install pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          run_install: false

      - name: Setup pnpm cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Setup build cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            packages/*/dist
            packages/*/tsconfig.tsbuildinfo
            plugins/*/dist
            plugins/*/tsconfig.tsbuildinfo
            orms/*/dist
            orms/*/tsconfig.tsbuildinfo
            tests/*/dist
            tests/*/tsconfig.tsbuildinfo
            examples/*/dist
            examples/*/tsconfig.tsbuildinfo
            orms/prisma/src/__tests__/fixtures-v6-client/generated
            orms/prisma/src/__tests__/fixtures-v6-client-js/generated
            orms/prisma/src/__tests__/fixtures-v7-client/generated
            orms/prisma/src/__tests__/fixtures-v7-client-js/generated
            tests/*/prisma/generated
          key: ${{ runner.os }}-build-${{ hashFiles('packages/*/src/**', 'plugins/*/src/**', 'orms/*/src/**', 'tests/*/src/**', 'packages/*/tsconfig.json', 'plugins/*/tsconfig.json', 'orms/*/tsconfig.json', 'tests/*/tsconfig.json') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bootstrap MSSQL
        uses: ./.github/actions/bootstrap-mssql

      - name: Wait for Postgres
        uses: ./.github/actions/wait-for-postgres

      - name: Migrate databases
        run: |
          pnpm db-migrate:postgres
          pnpm db-migrate:sqlite3
          pnpm db-migrate:mssql

      - name: Build
        run: pnpm build

      - name: Reinstall after codegen
        run: pnpm install --no-frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '10.0.x'

      - name: Build .NET solution
        run: dotnet build stacks/dotnet/Vexnor.sln --nologo

      - name: Run .NET tests with coverage
        run: |
          dotnet test stacks/dotnet/tests/Vexnor.Core.Tests/Vexnor.Core.Tests.csproj \
            --nologo --no-build \
            --collect:"XPlat Code Coverage" \
            --results-directory stacks/dotnet/TestResults
          dotnet test stacks/dotnet/tests/Vexnor.Integration.Tests/Vexnor.Integration.Tests.csproj \
            --nologo --no-build \
            --collect:"XPlat Code Coverage" \
            --results-directory stacks/dotnet/TestResults
        env:
          ConnectionStrings__Postgres: "Host=localhost;Port=5432;Database=postgres;Username=postgres;Password=postgres"

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage
          path: |
            coverage/clover.xml
            coverage/coverage-summary.json
            coverage/coverage-final.json
            stacks/dotnet/TestResults/**/coverage.cobertura.xml

  # ─────────────────────────────────────────────────────────────────────────────
  # Report — secrets scoped to reporting only
  # Downloads coverage artifact and posts results. No code executes.
  # ─────────────────────────────────────────────────────────────────────────────
  report:
    needs: build-and-test
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
      checks: write
      pull-requests: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download coverage artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: coverage
          path: .

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@04b047e8bb82a0c002c8312c1c880fbc6a999d45 # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/clover.xml
          flags: nodejs
          fail_ci_if_error: false

      - name: Upload .NET coverage to Codecov
        uses: codecov/codecov-action@04b047e8bb82a0c002c8312c1c880fbc6a999d45 # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: stacks/dotnet/TestResults/**/coverage.cobertura.xml
          flags: dotnet
          fail_ci_if_error: false

      - name: Codecov summary link
        run: |
          echo "### Coverage" >> $GITHUB_STEP_SUMMARY
          echo "[View on Codecov](https://app.codecov.io/github/vexnor-dev/vexnor/commit/${GITHUB_SHA})" >> $GITHUB_STEP_SUMMARY

      - name: Test summary
        uses: davelosert/vitest-coverage-report-action@02f3c2e641286b7fa308cd3e430783103ce6103b # v2
        with:
          json-summary-path: coverage/coverage-summary.json
          json-final-path: coverage/coverage-final.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          comment-on: pr
