packages:
  - packages/**
  - examples/**
  - tests/**
  - '!**/dist/**'
  - '!**/build/**'
  - '!**/deploy/**'

allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  better-sqlite3: true
  esbuild: true
  prisma: true
  sqlite3: true
  sharp: true
  unrs-resolver: true
  protobufjs: true

ignoredBuiltDependencies:
  - sharp
  - unrs-resolver
