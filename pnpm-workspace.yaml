packages:
  - packages/**
  - examples/**
  - tests/**
  - '!**/dist/**'
  - '!**/build/**'
  - '!**/deploy/**'

overrides:
  drizzle-orm: 1.0.0-rc.4-5d5b77c
  sql-formatter: 15.7.4

peerDependencyRules:
  ignoreMissing:
    - '@electric-sql/pglite'
    - '@types/mssql'
    - mssql
    - '@sinclair/typebox'

allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  better-sqlite3: true
  esbuild: true
  prisma: true
  sqlite3: true
  sharp: true
  unrs-resolver: true
  protobufjs: true

ignoredBuiltDependencies:
  - sharp
  - unrs-resolver
